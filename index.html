<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>政治獻金查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>



<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 載入中遮罩 -->
<div id="loading-overlay" style="
  position:fixed;inset:0;z-index:9999;
  background:var(--bg,#f5f5f5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s ease">
  <div style="font-size:1.5rem;font-weight:700;color:var(--text,#111);letter-spacing:.05em">政治獻金查詢</div>
  <div style="display:flex;gap:7px;align-items:center">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--accent,#2563eb);
      animation:ldot .9s infinite ease-in-out both;animation-delay:0s"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--accent,#2563eb);
      animation:ldot .9s infinite ease-in-out both;animation-delay:.18s"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--accent,#2563eb);
      animation:ldot .9s infinite ease-in-out both;animation-delay:.36s"></span>
  </div>
  <div id="loading-msg" style="font-size:.78rem;color:var(--muted,#888)">載入資料中…</div>
</div>
<style>
@keyframes ldot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">政</div>
    政治獻金查詢
  </div>
  <div class="topbar-divider"></div>
  <nav id="topbar-nav" style="display:flex;align-items:center;gap:4px;margin-left:14px">
    <!-- 地方選舉主按鈕 -->
    <button id="nav-local" onclick="switchPage('local')"
      style="font-size:.72rem;padding:3px 10px;border-radius:6px;border:1.5px solid transparent;
             background:var(--accent);color:#fff;font-family:inherit;font-weight:600;line-height:1.4;
             cursor:pointer;transition:all .15s;white-space:nowrap">
      地方選舉
    </button>

    <!-- 總統立委主按鈕 -->
    <button id="nav-national" onclick="switchPage('national')"
      style="font-size:.72rem;padding:3px 10px;border-radius:6px;border:1.5px solid transparent;
             background:transparent;color:var(--muted);font-family:inherit;font-weight:600;line-height:1.4;
             cursor:pointer;transition:all .15s;white-space:nowrap">
      總統立委
    </button>

    <button id="nav-party" onclick="switchPage('party')"
      style="font-size:.72rem;padding:3px 10px;border-radius:6px;border:1.5px solid transparent;
             background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;
             font-weight:600;line-height:1.4;transition:all .15s;white-space:nowrap">政黨</button>
    <button id="nav-donor" onclick="switchPage('donor')"
      style="font-size:.72rem;padding:3px 10px;border-radius:6px;border:1.5px solid transparent;
             background:transparent;color:var(--muted);font-family:inherit;font-weight:600;
             line-height:1.4;cursor:pointer;transition:all .15s;white-space:nowrap">
      捐款來源
    </button>

  </nav>
  <div class="topbar-right">
    
    <span class="topbar-badge">來源：監察院</span>
  </div>
</header>

<div class="app">
  <!-- 捐款來源頁面（全版面） -->
  <!-- 手機版捐款來源頁 filter bar（靜態，和 page-donor 同層）-->
    <div id="ud-mobile-filter-bar" style="display:none">
      <div id="ud-mobile-search-wrap">
        <span id="ud-mobile-search-icon">🔍</span>
        <input id="ud-mobile-search" type="text" placeholder="搜尋捐款來源…" autocomplete="off"
          oninput="udMobileSearch(this.value)">
      </div>
      <button id="ud-mobile-filter-btn" onclick="udOpenDonorSheet()">
        <span>⚙</span> 篩選
      </button>
      <button id="ud-mobile-type-btn" onclick="openDonorTypeSheet()"
        style="display:flex;align-items:center;gap:4px;padding:7px 10px;
               border:1.5px solid var(--border);border-radius:10px;
               background:var(--surface);color:var(--text);font-size:.75rem;
               font-weight:600;cursor:pointer;font-family:inherit;
               white-space:nowrap;flex-shrink:0">
        👤 <span id="ud-mobile-type-label">企業/團體</span>
      </button>
    </div>
  <div id="page-donor" style="display:none;width:100%;height:100%;overflow:hidden;flex-direction:column"></div>
  <!-- ══ 政黨頁面 ══ -->
  <div id="page-party" style="display:none;flex:1;overflow:hidden;height:100%">
    <div id="party-sidebar" style="width:260px;flex-shrink:0;background:var(--surface);
         border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 16px 10px;border-bottom:1px solid var(--border)">
        <div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
                    color:var(--muted);margin-bottom:10px">政黨列表</div>
        <div style="position:relative">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);
                       color:var(--muted);font-size:.82rem">&#128269;</span>
          <input id="party-search" type="text" placeholder="搜尋政黨..." autocomplete="off" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:8px 10px 8px 32px;border-radius:var(--radius-sm);font-size:.8rem;font-family:var(--sans);outline:none">
        </div>
        <div id="party-list-meta" style="font-size:.7rem;color:var(--muted);margin-top:8px"></div>
      </div>
      <div id="party-list" style="flex:1;overflow-y:auto;padding:6px 0"></div>
    </div>
    <div id="party-main" style="flex:1;overflow-y:auto;background:var(--bg)">
      <div id="party-detail" style="padding:28px 32px">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    height:60vh;gap:14px;color:var(--sub)">
          <div style="font-size:2.5rem">&#127963;</div>
          <div style="font-size:.95rem;font-weight:600;color:var(--text)">選擇左側政黨以查看詳細資料</div>
          <div style="font-size:.8rem">共
            <strong style="color:var(--accent)" id="party-total-count">-</strong> 個政黨有申報資料</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar-aside">
    <!-- 手機版頂部搜尋列（桌面版隱藏） -->
    <div id="mobile-filter-bar" style="display:none">
      <div id="mobile-search-wrap">
        <span id="mobile-search-icon">🔍</span>
        <input id="mobile-search-inline" type="text"
          placeholder="搜尋候選人姓名…" autocomplete="off"
          oninput="document.getElementById('searchInput').value=this.value;applyFilter()">
      </div>
      <button id="mobile-filter-btn" onclick="openFilterSheet()">
        <span id="filter-btn-icon">⚙</span> 篩選
      </button>
      <button id="mobile-yr-btn" onclick="openElectionYrSheet()"
        style="display:none;align-items:center;gap:4px;padding:7px 10px;
               border:1.5px solid var(--border);border-radius:10px;
               background:var(--surface);color:var(--text);font-size:.75rem;
               font-weight:600;cursor:pointer;font-family:inherit;
               white-space:nowrap;flex-shrink:0">
        📅 <span id="mobile-yr-label">年份</span>
      </button>
    </div>
    <div class="sidebar-header" id="sidebarHeader">
      <!-- 手機版展開/收合按鈕 -->
      <div id="sidebar-toggle"
        onclick="(function(){
          const h=document.getElementById('sidebarHeader');
          const arr=document.getElementById('sidebar-toggle-arrow');
          h.classList.toggle('collapsed');
          arr.style.transform=h.classList.contains('collapsed')?'rotate(180deg)':'rotate(0deg)';
        })()"
      >
        <span id="sidebar-toggle-arrow">▲</span>
      </div>
      <h2>搜尋候選人</h2>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="輸入候選人姓名…" autocomplete="off">
      </div>
      <div class="filter-row" id="filter-row-main">
        <select id="filterCity" onchange="onFilterCityChange()" style="order:1"><option value="">所有縣市</option></select>
        <select id="filterLevel" onchange="onFilterLevelChange()" style="order:2"><option value="">所有層級</option></select>
      </div>
      <div style="margin-top:8px">
        <select id="filterParty" onchange="onFilterPartyChange()" style="width:100%"><option value="">所有政黨</option></select>
      </div>
    </div>
    <div class="result-meta">共 <strong id="resultCount">0</strong> 位候選人<span id="sort-note" style="color:var(--muted);font-size:.68rem;margin-left:6px">依收入排序</span></div>
    <div class="cand-list" id="candList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
  <!-- 手機版返回列表按鈕 -->

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏛</div>
      <h3>選擇候選人查看獻金明細</h3>
      <p>從左側清單點選，或直接搜尋候選人姓名</p>
    </div>
    <div class="detail" id="detailPanel" style="display:none"></div>
  </main>
</div>

<!-- 手機版返回按鈕：獨立於 mainArea 之外，真正 fixed 在底部 -->
<div id="mobile-back-btn"
  onclick="(function(){if(window.innerWidth<=900){const ma=document.getElementById('mainArea');if(ma){ma.classList.remove('mobile-visible');setTimeout(()=>ma.scrollTo({top:0,behavior:'instant'}),300);}document.getElementById('mobile-back-btn').style.display='none';}else{const sb=document.querySelector('.sidebar');if(sb){sb.style.maxHeight='';sb.style.overflow='';}window.scrollTo(0,0);setTimeout(()=>sb&&sb.scrollIntoView({behavior:'smooth'}),60);}})()"
  style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
         background:var(--surface);border-top:1px solid var(--border);
         padding:14px 20px;font-size:.82rem;color:var(--accent);cursor:pointer;
         font-weight:600;align-items:center;justify-content:center;gap:6px;
         box-shadow:0 -2px 12px rgba(0,0,0,.1)">
  ← 返回列表
</div>

<div id="loading" style="
  position:fixed;inset:0;background:rgba(240,242,248,.98);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:9999;font-family:var(--sans);padding:40px">
  <!-- Logo / 標題 -->
  <div style="font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:.02em">
    政治獻金查詢
  </div>
  <!-- 說明文字 -->
  <p id="loading-label" style="color:var(--muted);font-size:.82rem;margin:0">
    正在載入資料…
  </p>
  <!-- 進度條容器 -->
  <div style="width:260px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
    <div id="loading-bar"
         style="height:100%;width:0%;background:var(--accent);border-radius:3px;
                transition:width 0.3s ease"></div>
  </div>
  <!-- 百分比數字 -->
  <p id="loading-pct" style="color:var(--accent);font-size:.8rem;font-weight:700;
                              font-variant-numeric:tabular-nums;margin:0">0%</p>
</div>
    </div>
  </div>



<!-- 手機版篩選 Bottom Sheet -->
<div id="filter-sheet-overlay" onclick="closeFilterSheet()"></div>
<div id="filter-sheet" role="dialog" aria-modal="true">
  <div id="filter-sheet-handle"></div>
  <div id="filter-sheet-header">
    <span id="filter-sheet-title">篩選條件</span>
    <button id="filter-sheet-close" onclick="closeFilterSheet()">✕</button>
  </div>
  <div id="filter-sheet-body" style="display:flex;flex-direction:column">
    <div id="sheet-city-row" style="order:1">
      <label id="sheet-city-label">縣市</label>
      <select id="sheetCity" onchange="onSheetCityChange()">
        <option value="">所有縣市</option>
      </select>
    </div>
    <div id="sheet-level-row" style="order:2">
      <label>參選層級</label>
      <select id="sheetLevel" onchange="onSheetLevelChange()">
        <option value="">所有層級</option>
      </select>
    </div>
    <div style="order:3">
      <label>政黨</label>
      <select id="sheetParty">
        <option value="">所有政黨</option>
      </select>
    </div>
  </div>
  <div id="filter-sheet-footer">
    <button id="filter-reset-btn" onclick="resetSheetFilters()">清除篩選</button>
    <button id="filter-apply-btn" onclick="syncSheetToMain();closeFilterSheet()">套用篩選</button>
  </div>
</div>

<!-- 政黨頁年份選擇 Bottom Sheet -->
<div id="party-yr-sheet-overlay" onclick="closePartyYrSheet()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;opacity:0;transition:opacity 0.25s ease"></div>
<div id="party-yr-sheet" style="position:fixed;left:0;right:0;bottom:0;z-index:301;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);max-height:60vh;display:flex;flex-direction:column;overflow:hidden">
  <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)">
    <span style="font-size:.9rem;font-weight:700;color:var(--text)">選擇年份</span>
    <button onclick="closePartyYrSheet()" style="background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted);padding:4px">✕</button>
  </div>
  <div id="party-yr-sheet-body" style="overflow-y:auto;padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:8px"></div>
  <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0">
    <button onclick="closePartyYrSheet()" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;font-family:var(--sans);cursor:pointer">取消</button>
    <button onclick="applyPartyYrSheet()" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.85rem;font-family:var(--sans);font-weight:600;cursor:pointer">套用</button>
  </div>
</div>

<!-- 地方/總統立委頁年份選擇 Bottom Sheet -->
<div id="election-yr-sheet-overlay" onclick="closeElectionYrSheet()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;opacity:0;transition:opacity 0.25s ease"></div>
<div id="election-yr-sheet" style="position:fixed;left:0;right:0;bottom:0;z-index:301;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);max-height:60vh;display:flex;flex-direction:column;overflow:hidden">
  <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)">
    <span style="font-size:.9rem;font-weight:700;color:var(--text)">選擇年份</span>
    <button onclick="closeElectionYrSheet()" style="background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted);padding:4px">✕</button>
  </div>
  <div id="election-yr-sheet-body" style="overflow-y:auto;padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:8px"></div>
  <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0">
    <button onclick="closeElectionYrSheet()" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;font-family:var(--sans);cursor:pointer">取消</button>
    <button onclick="applyElectionYrSheet()" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.85rem;font-family:var(--sans);font-weight:600;cursor:pointer">套用</button>
  </div>
</div>

<!-- 捐款來源頁類型選擇 Bottom Sheet -->
<div id="donor-type-sheet-overlay" onclick="closeDonorTypeSheet()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;opacity:0;transition:opacity 0.25s ease"></div>
<div id="donor-type-sheet" style="position:fixed;left:0;right:0;bottom:0;z-index:301;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);max-height:50vh;display:flex;flex-direction:column;overflow:hidden">
  <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)">
    <span style="font-size:.9rem;font-weight:700;color:var(--text)">選擇類型</span>
    <button onclick="closeDonorTypeSheet()" style="background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted);padding:4px">✕</button>
  </div>
  <div style="overflow-y:auto;padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:8px">
    <label id="donor-type-opt-corp" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--accent);background:var(--accent-lt)">
      <input type="radio" name="donor-type-radio" value="corp" checked style="accent-color:var(--accent)">
      <span style="font-size:.88rem;font-weight:700;color:var(--accent)">企業/團體</span>
    </label>
    <label id="donor-type-opt-pers" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:transparent">
      <input type="radio" name="donor-type-radio" value="pers" style="accent-color:var(--accent)">
      <span style="font-size:.88rem;font-weight:500;color:var(--text)">個人</span>
    </label>
  </div>
  <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0">
    <button onclick="closeDonorTypeSheet()" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;font-family:var(--sans);cursor:pointer">取消</button>
    <button onclick="applyDonorTypeSheet()" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.85rem;font-family:var(--sans);font-weight:600;cursor:pointer">套用</button>
  </div>
</div>

<!-- 捐款來源頁：手機版 Bottom Sheet -->
<div id="donor-sheet-overlay" onclick="closeDonorSheet()"></div>
<div id="donor-sheet">
  <div id="donor-sheet-handle"></div>
  <div id="donor-sheet-header">
    <span id="donor-sheet-title">篩選條件</span>
    <button id="donor-sheet-close" onclick="closeDonorSheet()">✕</button>
  </div>
  <div id="donor-sheet-body">
    <div id="donor-sheet-filter-section">
      <span class="sheet-field-label" id="donor-sheet-filter-label">受捐人數</span>
      <div class="sheet-radio-group">
        <label class="sheet-radio"><input type="radio" name="ds-filter" value="all" checked onchange="donorSheetFilter=this.value"> 全部</label>
        <label class="sheet-radio"><input type="radio" name="ds-filter" value="single1" onchange="donorSheetFilter=this.value"> 1 人</label>
        <label class="sheet-radio" id="ds-filter-multi2-label"><input type="radio" name="ds-filter" value="multi2" onchange="donorSheetFilter=this.value"> 2+ 人（多捐型）</label>
        <label class="sheet-radio" id="ds-filter-multi5-label"><input type="radio" name="ds-filter" value="multi5" onchange="donorSheetFilter=this.value"> 5 人以上</label>
      </div>
    </div>
    <div id="donor-sheet-type-section">
      <span class="sheet-field-label">類型</span>
      <div class="sheet-radio-group">
        <label class="sheet-radio"><input type="radio" name="ds-type" value="all" checked onchange="donorSheetType=this.value"> 全部</label>
        <label class="sheet-radio"><input type="radio" name="ds-type" value="corp" onchange="donorSheetType=this.value"> 營利事業</label>
        <label class="sheet-radio"><input type="radio" name="ds-type" value="org" onchange="donorSheetType=this.value"> 人民團體</label>
      </div>
    </div>
    <div>
      <span class="sheet-field-label">排序</span>
      <div class="sheet-radio-group">
        <label class="sheet-radio"><input type="radio" name="ds-sort" value="total" checked onchange="donorSheetSort=this.value"> 捐款總額</label>
        <label class="sheet-radio"><input type="radio" name="ds-sort" value="n_cands" onchange="donorSheetSort=this.value"> 受捐人數</label>
        <label class="sheet-radio"><input type="radio" name="ds-sort" value="cross" onchange="donorSheetSort=this.value"> 跨黨派程度</label>
      </div>
    </div>
  </div>
  <div id="donor-sheet-footer">
    <button id="donor-reset-btn" onclick="resetDonorSheet()">清除篩選</button>
    <button id="donor-apply-btn" onclick="applyDonorSheet()">套用篩選</button>
  </div>
